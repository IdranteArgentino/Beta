{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Nuovo Utente</h1>
    <p class="subtitle">Crea un nuovo account per staff o amministratore.</p>
  </div>
  <a href="{{ url_for('utenti') }}" class="btn-secondary">Torna alla lista</a>
</div>

<div class="form-container">
  <form method="post" action="{{ url_for('utenti_new') }}" class="form-card">
    <h2>Dati Utente</h2>

    <div class="form-group">
      <label for="username">Username *</label>
      <input type="text" id="username" name="username" placeholder="Es. mario.rossi" value="{{ (form_data.username if form_data else '') }}" required autofocus>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="nome">Nome *</label>
        <input type="text" id="nome" name="nome" placeholder="Es. Mario" value="{{ (form_data.nome if form_data else '') }}" required>
      </div>
      <div class="form-group">
        <label for="cognome">Cognome *</label>
        <input type="text" id="cognome" name="cognome" placeholder="Es. Rossi" value="{{ (form_data.cognome if form_data else '') }}" required>
      </div>
    </div>

    <div class="form-group">
      <label for="ruolo">Ruolo *</label>
      <select id="ruolo" name="ruolo" required>
        <option value="STAFF" {% if not form_data or form_data.ruolo == 'STAFF' %}selected{% endif %}>Staff</option>
        <option value="ADMIN" {% if form_data and form_data.ruolo == 'ADMIN' %}selected{% endif %}>Amministratore</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">Crea Utente</button>
      <a href="{{ url_for('utenti') }}" class="btn-cancel">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
