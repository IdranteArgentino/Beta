{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Modifica Progetto</h1>
    <p class="subtitle">ID: <strong>#{{ item.id }}</strong> | {{ item.nome_progetto }}</p>
  </div>
  <a href="{{ url_for('progetti_detail', item_id=item.id) }}" class="btn-secondary">Torna al dettaglio</a>
</div>

<div class="form-container">
  <form method="post" action="{{ url_for('progetti_edit', item_id=item.id) }}" class="form-card">
    <h2>🏗️ Dati Progetto</h2>

    <div class="form-group">
      <label for="nome_progetto">Nome Progetto *</label>
      <input type="text" id="nome_progetto" name="nome_progetto" value="{{ item.nome_progetto }}" required>
    </div>

    <div class="form-group">
      <label for="id_cliente">Cliente *</label>
      <select id="id_cliente" name="id_cliente" required>
        <option value="">-- Seleziona Cliente --</option>
        {% for c in clienti %}
        <option value="{{ c.id }}" {% if c.id == item.id_cliente %}selected{% endif %}>{{ c.ragione_sociale }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="indirizzo_cantiere">Indirizzo Cantiere</label>
      <input type="text" id="indirizzo_cantiere" name="indirizzo_cantiere" value="{{ item.indirizzo_cantiere or '' }}">
    </div>

    <div class="form-group">
      <label for="note">Note</label>
      <textarea id="note" name="note" rows="4">{{ item.note or '' }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">✓ Salva Modifiche</button>
      <a href="{{ url_for('progetti_detail', item_id=item.id) }}" class="btn-cancel">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
