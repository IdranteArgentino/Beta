{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Modifica Utente</h1>
    <p class="subtitle">ID: <strong>#{{ item.id }}</strong> | {{ item.username }}</p>
  </div>
  <a href="{{ url_for('utenti_detail', item_id=item.id) }}" class="btn-secondary">Torna al dettaglio</a>
</div>

<div class="form-container">
  <form method="post" action="{{ url_for('utenti_edit', item_id=item.id) }}" class="form-card">
    <h2>⚙️ Dati Utente</h2>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" value="{{ item.username }}" readonly>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="nome">Nome *</label>
        <input type="text" id="nome" name="nome" value="{{ item.nome }}" required>
      </div>
      <div class="form-group">
        <label for="cognome">Cognome *</label>
        <input type="text" id="cognome" name="cognome" value="{{ item.cognome }}" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="ruolo">Ruolo *</label>
        <select id="ruolo" name="ruolo">
          <option value="STAFF" {% if item.ruolo == 'STAFF' %}selected{% endif %}>Staff</option>
          <option value="ADMIN" {% if item.ruolo == 'ADMIN' %}selected{% endif %}>Amministratore</option>
        </select>
      </div>
      <div class="form-group">
        <label for="stato">Stato *</label>
        <select id="stato" name="stato">
          <option value="ATTIVO" {% if item.stato == 'ATTIVO' %}selected{% endif %}>Attivo</option>
          <option value="DISATTIVATO" {% if item.stato == 'DISATTIVATO' %}selected{% endif %}>Disattivato</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">✓ Salva Modifiche</button>
      <a href="{{ url_for('utenti_detail', item_id=item.id) }}" class="btn-cancel">Annulla</a>
    </div>
  </form>

  <form method="post" action="{{ url_for('utenti_reset_password', item_id=item.id) }}" id="resetPasswordForm" class="form-card" data-double-confirm="true" data-confirm-first="Vuoi resettare la password di {{ item.username }}?" data-confirm-button="Conferma reset password">
    <h2>🔐 Sicurezza Account</h2>
    <p class="subtitle">Resetta la password dell'utente a <strong>{{ item.username }}</strong>.</p>
    <div class="form-actions">
      <button type="submit" class="btn-warning">↻ Reset Password</button>
    </div>
  </form>
</div>
{% endblock %}
