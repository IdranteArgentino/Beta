{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <div>
    <h1>➕ Nuovo Cliente</h1>
    <p class="subtitle">Aggiungi un nuovo cliente al sistema</p>
  </div>
  <a href="{{ url_for('clienti') }}" class="btn-secondary">← Torna alla lista</a>
</div>

<div class="form-container">
  <form method="post" action="{{ url_for('clienti_new') }}" class="form-card">
    <h2>📋 Informazioni Cliente</h2>

    <div class="form-group">
      <label for="ragione_sociale">Ragione Sociale *</label>
      <input type="text" id="ragione_sociale" name="ragione_sociale" placeholder="Es. Acme S.r.l." required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Es. Marco">
      </div>
      <div class="form-group">
        <label for="cognome">Cognome</label>
        <input type="text" id="cognome" name="cognome" placeholder="Es. Rossi">
      </div>
    </div>

    <div class="form-group">
      <label for="indirizzo">Indirizzo</label>
      <input type="text" id="indirizzo" name="indirizzo" placeholder="Es. Via Roma, 123 - Milano">
    </div>

    <div class="form-group">
      <label for="telefono">Telefono</label>
      <input type="tel" id="telefono" name="telefono" placeholder="Es. +39 02 1234 5678">
    </div>

    <div class="form-group">
      <label for="note">Note</label>
      <textarea id="note" name="note" placeholder="Note aggiuntive sul cliente..." rows="4"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">✓ Salva Cliente</button>
      <a href="{{ url_for('clienti') }}" class="btn-cancel">Annulla</a>
    </div>
  </form>
</div>

{% endblock %}
