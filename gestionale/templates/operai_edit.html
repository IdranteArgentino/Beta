{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Modifica Operaio</h1>
    <p class="subtitle">ID: <strong>#{{ item.id }}</strong> | {{ item.nome }} {{ item.cognome }}</p>
  </div>
  <a href="{{ url_for('operai_detail', item_id=item.id) }}" class="btn-secondary">Torna al dettaglio</a>
</div>

<div class="form-container">
  <form method="post" action="{{ url_for('operai_edit', item_id=item.id) }}" class="form-card">
    <h2>👷 Dati Operaio</h2>

    <div class="form-row">
      <div class="form-group">
        <label for="nome">Nome *</label>
        <input type="text" id="nome" name="nome" value="{{ item.nome }}" required>
      </div>
      <div class="form-group">
        <label for="cognome">Cognome *</label>
        <input type="text" id="cognome" name="cognome" value="{{ item.cognome }}" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="alias">Alias</label>
        <input type="text" id="alias" name="alias" value="{{ item.alias or '' }}">
      </div>
      <div class="form-group">
        <label for="costo_orario_base">Costo Orario Base *</label>
        <input type="number" id="costo_orario_base" name="costo_orario_base" step="0.01" value="{{ item.costo_orario_base }}" required>
      </div>
    </div>

    <div class="form-group">
      <label for="note">Note</label>
      <textarea id="note" name="note" rows="4">{{ item.note or '' }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">✓ Salva Modifiche</button>
      <a href="{{ url_for('operai_detail', item_id=item.id) }}" class="btn-cancel">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
