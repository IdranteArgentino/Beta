{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <div>
    <h1>✏️ Modifica Scheda Giornaliera</h1>
    <p class="subtitle">ID: <strong>#{{ item.id }}</strong> | {{ item.data }}</p>
  </div>
  <a href="{{ url_for('giornaliero_detail', item_id=item.id) }}" class="btn-secondary">← Torna al dettaglio</a>
</div>

<div class="form-container">
  <form method="post" action="{{ url_for('giornaliero_edit', item_id=item.id) }}" class="form-card">
    <h2>📋 Dati Scheda</h2>

    <div class="form-row">
      <div class="form-group">
        <label for="data">Data *</label>
        <input type="date" id="data" name="data" value="{{ item.data }}" required>
      </div>
      <div class="form-group">
        <label>Progetto</label>
        <input type="text" value="Progetto #{{ item.id_progetto }}" readonly>
      </div>
    </div>

    <div class="form-group">
      <label for="descrizione">Descrizione</label>
      <textarea id="descrizione" name="descrizione" rows="4">{{ item.descrizione or '' }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">✓ Salva Modifiche</button>
      <a href="{{ url_for('giornaliero_detail', item_id=item.id) }}" class="btn-cancel">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
